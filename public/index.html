<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup 2026 OBS Dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=20260610c" />
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <header class="topbar">
        <section class="brand">
          <div>
            <p class="eyebrow">FIFA World Cup</p>
            <h1>2026 World Cup Live</h1>
          </div>
        </section>

        <section class="skyros-lockup">
          <div>
            <p>Live Stream Desk</p>
            <strong>Deepwater Skyros</strong>
          </div>
        </section>

        <section class="clock-panel">
          <span id="local-time">--:--</span>
          <small id="last-refresh">Waiting for data</small>
        </section>
      </header>

      <section class="alert-bar" id="alert-bar" hidden></section>

      <section class="viewport">
        <article class="slide active" data-slide="overview">
          <div class="hero-match">
            <p class="section-kicker" id="spotlight-label">Next Match</p>
            <div class="matchup" id="spotlight-match"></div>
            <div class="match-details" id="spotlight-details"></div>
          </div>
          <div class="metrics" id="overview-metrics"></div>
        </article>

        <article class="slide" data-slide="results">
          <div class="section-heading">
            <p class="section-kicker">Latest Results</p>
            <h2>Completed Matches</h2>
          </div>
          <div class="result-grid" id="result-grid"></div>
        </article>

        <article class="slide" data-slide="today">
          <div class="section-heading">
            <p class="section-kicker">Matchday Watch</p>
            <h2>Today and Next Up</h2>
          </div>
          <div class="schedule-board" id="schedule-board"></div>
        </article>

        <article class="slide" data-slide="groups">
          <div class="section-heading">
            <p class="section-kicker">Group Tables</p>
            <h2 id="group-title">Standings</h2>
          </div>
          <div class="standings-board" id="standings-board"></div>
        </article>

        <article class="slide" data-slide="teams">
          <div class="section-heading">
            <p class="section-kicker">Tournament Field</p>
            <h2>Qualified Teams</h2>
          </div>
          <div class="team-wall" id="team-wall"></div>
        </article>
      </section>

      <footer class="ticker-wrap">
        <div class="ticker-viewport">
          <div class="ticker-track" id="ticker-track"></div>
        </div>
      </footer>
    </main>

    <script src="/app.js?v=20260610c" type="module"></script>
  </body>
</html>
